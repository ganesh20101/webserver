- name: copy module
  hosts: all
  tasks:
    - name: Copy file with owner and permissions
      win_copy:
        src: /var/lib/jenkins/workspace/ansible/Firefox Setup 14.0.1.msi
        dest: C:\
        



    - name: Run the Linux command
      win_shell:
        cmd: msiexec /quiet /i "C:\Firefox Setup 14.0.1.msi" WRAPPED_ARGUMENTS="/S"

   

    

    




